<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Unsubscribed · The Flip</title>
<meta name="description" content="You have been unsubscribed.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     DESIGN TOKENS  ·  edit these to match the Flip site exactly.
     Keep these identical to thank-you.html and confirmed.html.
     These hex/font values are PLACEHOLDERS pending the Flip's
     real CSS. Layout and copy below are design decisions.
     ============================================================ */
  :root {
    --paper:   #f4f3ef;
    --ink:     #1a1917;
    --ash:     #6b6660;
    --line:    #d9d5cc;
    --accent:  #9e2b25;

    --display: "Cormorant Garamond", Georgia, "Times New Roman", serif;
    --body:    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --mono:    "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--body);
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  main {
    width: 100%;
    max-width: 34rem;
    text-align: center;
    animation: rise 0.7s ease-out both;
  }

  .kicker {
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 1.4rem;
  }

  h1 {
    font-family: var(--display);
    font-weight: 600;
    font-size: clamp(2.4rem, 7vw, 3.4rem);
    line-height: 1.08;
    letter-spacing: 0.005em;
    margin: 0 0 1.2rem;
    text-wrap: balance;
  }

  .lede {
    font-size: 1.08rem;
    color: var(--ash);
    margin: 0 auto;
    max-width: 30rem;
    text-wrap: pretty;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) { main { animation: none; } }
</style>
</head>
<body>
  <main>
    <p class="kicker">Unsubscribed</p>
    <h1>You are unsubscribed.</h1>
    <p class="lede">You have been removed from the list and will not receive further emails from us.</p>
  </main>
</body>
</html>
