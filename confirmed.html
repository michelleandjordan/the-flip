<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>You&rsquo;re in · The Flip</title>
<meta name="description" content="You now follow the work.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     DESIGN TOKENS  ·  edit these to match the Flip site exactly.
     Keep these identical to thank-you.html so both pages match.
     These hex/font values are PLACEHOLDERS pending the Flip's
     real CSS. Layout and copy below are design decisions.
     ============================================================ */
  :root {
    --paper:   #f4f3ef;
    --ink:     #1a1917;
    --ash:     #6b6660;
    --line:    #d9d5cc;
    --accent:  #9e2b25;

    --display: "Cormorant Garamond", Georgia, "Times New Roman", serif;
    --body:    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --mono:    "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--body);
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  main {
    width: 100%;
    max-width: 34rem;
    text-align: center;
    animation: rise 0.7s ease-out both;
  }

  .kicker {
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 1.4rem;
  }

  h1 {
    font-family: var(--display);
    font-weight: 600;
    font-size: clamp(2.4rem, 7vw, 3.4rem);
    line-height: 1.08;
    letter-spacing: 0.005em;
    margin: 0 0 1.2rem;
    text-wrap: balance;
  }

  .lede {
    font-size: 1.08rem;
    color: var(--ink);
    margin: 0 auto 1.4rem;
    max-width: 30rem;
    text-wrap: pretty;
  }

  .note {
    font-size: 0.98rem;
    color: var(--ash);
    margin: 0 auto;
    max-width: 30rem;
    text-wrap: pretty;
  }

  .rule { width: 3rem; height: 1px; background: var(--line); border: 0; margin: 2.2rem auto; }

  .back {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.76rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 0.7rem 1.3rem;
    transition: border-color 0.2s ease, color 0.2s ease;
  }
  .back:hover { border-color: var(--accent); color: var(--accent); }
  .back:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

  .mark {
    font-family: var(--display);
    font-style: italic;
    font-size: 1rem;
    color: var(--ink);
    margin-top: 2.6rem;
  }
  .mark .sep { color: var(--line); font-style: normal; padding: 0 0.4rem; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) { main { animation: none; } }
</style>
</head>
<body>
  <main>
    <p class="kicker">You&rsquo;re in</p>
    <h1>Welcome. You&rsquo;re on&nbsp;the&nbsp;list.</h1>
    <p class="lede">Thank you for following the work. We will write a few times a year, when a Victory is finished, a new painting is released, or an event is coming up.</p>
    <p class="note">Nothing crowded, nothing to sell. Only the moments worth telling you about.</p>
    <hr class="rule">
    <a class="back" href="https://theflip.michelleandjordancook.com/">Return to The Flip</a>
    <p class="mark">The Flip</p>
  </main>
</body>
</html>
